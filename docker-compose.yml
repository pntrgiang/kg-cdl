services:
  db:
    image: postgres:16-alpine
    container_name: kg_cdl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kg_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kg_cdl}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kg_cdl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kg} -d ${POSTGRES_DB:-kg_cdl}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: kg_cdl_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"

volumes:
  kg_cdl_pgdata:
